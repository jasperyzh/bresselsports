services:
  db:
    image: mysql:8.0
    container_name: bressel_db
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-bressel_db}
      MYSQL_USER: ${MYSQL_USER:-bressel_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-securepassword123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword123}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - bressel_network

  wordpress:
    image: wordpress:latest
    container_name: bressel_wordpress
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-bressel_user}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-securepassword123}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-bressel_db}
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_ENVIRONMENT_TYPE', 'development');
    volumes:
      - wp_data:/var/www/html
      - ./twentytwentyfour-bressel:/var/www/html/wp-content/themes/twentytwentyfour-bressel
    ports:
      - "8080:80"
    networks:
      - bressel_network

  wp-cli:
    image: wordpress:cli
    container_name: bressel_wpcli
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: ${MYSQL_USER:-bressel_user}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD:-securepassword123}
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE:-bressel_db}
    volumes:
      - wp_data:/var/www/html
      - ./twentytwentyfour-bressel:/var/www/html/wp-content/themes/twentytwentyfour-bressel
    command: ["tail", "-f", "/dev/null"]
    networks:
      - bressel_network

volumes:
  db_data:
  wp_data:

networks:
  bressel_network:
    driver: bridge
