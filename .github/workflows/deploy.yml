name: Deploy BRESSEL Theme

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Assets (Vite)
        run: npm run build

      - name: Deploy to Server via Rsync
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_KEY }}
          ARGS:
            -rlgo
            -v
            --delete
          SOURCE:"twentytwentyfour-bressel/"
          REMOTE_HOST:${{ secrets.SSH_HOST }}
          REMOTE_USER:${{ secrets.SSH_USER }}
          TARGET: "/var/www/html/wp-content/themes/twentytwentyfour-bressel/"