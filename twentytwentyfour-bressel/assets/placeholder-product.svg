<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" preserveAspectRatio="xMidYMid slice">
  <rect width="480" height="480" fill="#0d1a1a"/>
  <!-- Teal gradient suggestion like mockup -->
  <defs>
    <linearGradient id="productGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a2a"/>
      <stop offset="100%" stop-color="#051515"/>
    </linearGradient>
  </defs>
  <rect width="480" height="480" fill="url(#productGrad)"/>
  <!-- Racket outline -->
  <g transform="translate(240,220)" opacity="0.25" fill="none" stroke="#4ecdc4" stroke-width="3">
    <ellipse cx="0" cy="-80" rx="110" ry="130"/>
    <rect x="-12" y="50" width="24" height="100" rx="5"/>
    <rect x="-18" y="140" width="36" height="18" rx="4"/>
  </g>
  <!-- String grid -->
  <g transform="translate(240,140)" opacity="0.12" stroke="#4ecdc4" stroke-width="1.5">
    <line x1="-80" y1="-120" x2="-80" y2="30"/>
    <line x1="-55" y1="-128" x2="-55" y2="30"/>
    <line x1="-30" y1="-130" x2="-30" y2="30"/>
    <line x1="-5"  y1="-130" x2="-5"  y2="30"/>
    <line x1="20"  y1="-130" x2="20"  y2="30"/>
    <line x1="45"  y1="-128" x2="45"  y2="30"/>
    <line x1="70"  y1="-120" x2="70"  y2="30"/>
    <line x1="-100" y1="-100" x2="100" y2="-100"/>
    <line x1="-108" y1="-75"  x2="108" y2="-75"/>
    <line x1="-110" y1="-50"  x2="110" y2="-50"/>
    <line x1="-110" y1="-25"  x2="110" y2="-25"/>
    <line x1="-108" y1="0"    x2="108" y2="0"/>
    <line x1="-100" y1="25"   x2="100" y2="25"/>
  </g>
  <!-- Bottom label -->
  <rect x="0" y="420" width="480" height="60" fill="#000000" opacity="0.7"/>
  <text x="240" y="450" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-weight="700" font-size="10"
        fill="#52525b" letter-spacing="3">
    PRODUCT IMAGE
  </text>
</svg>
