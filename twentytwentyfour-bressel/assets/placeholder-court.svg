<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" preserveAspectRatio="xMidYMid slice">
  <rect width="640" height="400" fill="#0a0a0a"/>
  <!-- Court surface -->
  <rect x="60" y="60" width="520" height="280" fill="#111a11" rx="4"/>
  <!-- Court lines -->
  <g stroke="#2a4a2a" stroke-width="2" fill="none">
    <!-- Outer bounds -->
    <rect x="80" y="80" width="480" height="240"/>
    <!-- Center line -->
    <line x1="320" y1="80" x2="320" y2="320"/>
    <!-- Service boxes -->
    <line x1="80" y1="200" x2="560" y2="200"/>
    <line x1="200" y1="200" x2="200" y2="320"/>
    <line x1="440" y1="200" x2="440" y2="320"/>
    <!-- Net -->
    <line x1="80" y1="200" x2="560" y2="200" stroke="#3a5a3a" stroke-width="3"/>
  </g>
  <!-- Glass walls suggestion -->
  <rect x="60" y="60" width="8" height="280" fill="#1a2a1a" opacity="0.8"/>
  <rect x="572" y="60" width="8" height="280" fill="#1a2a1a" opacity="0.8"/>
  <!-- Bottom label -->
  <rect x="0" y="350" width="640" height="50" fill="#000000" opacity="0.7"/>
  <text x="320" y="378" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-weight="700" font-size="10"
        fill="#52525b" letter-spacing="3">
    COURT / FACILITY PHOTO
  </text>
</svg>
