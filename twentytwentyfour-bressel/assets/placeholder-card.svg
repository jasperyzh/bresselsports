<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="400" fill="#111111"/>
  <rect width="600" height="400" fill="#18181b"/>
  <!-- Padel racket silhouette -->
  <g transform="translate(300,200)" opacity="0.12" fill="#ffffff">
    <!-- Racket head (oval) -->
    <ellipse cx="0" cy="-60" rx="70" ry="85" fill="none" stroke="#ffffff" stroke-width="6"/>
    <!-- String grid -->
    <g stroke="#ffffff" stroke-width="1.5" opacity="0.6">
      <line x1="-60" y1="-80" x2="-60" y2="-40"/>
      <line x1="-40" y1="-140" x2="-40" y2="10"/>
      <line x1="-20" y1="-145" x2="-20" y2="15"/>
      <line x1="0"  y1="-145" x2="0"  y2="15"/>
      <line x1="20" y1="-145" x2="20" y2="15"/>
      <line x1="40" y1="-140" x2="40" y2="10"/>
      <line x1="60" y1="-80" x2="60" y2="-40"/>
      <line x1="-65" y1="-100" x2="65" y2="-100"/>
      <line x1="-68" y1="-80"  x2="68" y2="-80"/>
      <line x1="-70" y1="-60"  x2="70" y2="-60"/>
      <line x1="-68" y1="-40"  x2="68" y2="-40"/>
      <line x1="-60" y1="-20"  x2="60" y2="-20"/>
      <line x1="-45" y1="0"    x2="45" y2="0"/>
    </g>
    <!-- Handle -->
    <rect x="-10" y="25" width="20" height="80" rx="4"/>
    <rect x="-14" y="95" width="28" height="12" rx="3"/>
  </g>
  <!-- Bottom label area -->
  <rect x="0" y="340" width="600" height="60" fill="#000000" opacity="0.6"/>
  <text x="300" y="375" text-anchor="middle" dominant-baseline="middle"
        font-family="Arial, sans-serif" font-weight="700" font-size="11"
        fill="#52525b" letter-spacing="3" text-transform="uppercase">
    BRESSEL™ IMAGE PLACEHOLDER
  </text>
</svg>
